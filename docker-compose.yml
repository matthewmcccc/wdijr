services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DB_URL=sqlite+aiosqlite:////data/app.db
      - DATA_DIR=/data
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - ./backend/app/.env
    depends_on:
      - redis

  worker:
    build: ./backend
    command: celery -A app.services.celery_worker worker --loglevel=info
    volumes:
      - ./data:/data
    environment:
      - DB_URL=sqlite+aiosqlite:////data/app.db
      - DATA_DIR=/data
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - ./backend/app/.env
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://65.108.48.214/api
    ports:
      - "80:80"